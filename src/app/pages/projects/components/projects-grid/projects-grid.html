<div>
  <h1 class="text-5xl md:text-6xl font-bold text-slate-900 dark:text-white mb-6 leading-tight">
    Mis <span class="text-blue-600 dark:text-blue-500">proyectos</span>
  </h1>
  <p class="text-xl text-slate-600 dark:text-slate-300 mb-12 max-w-2xl">
    Explora una selección de proyectos en los que he trabajado, donde combiné diseño moderno con funcionalidad eficiente.
  </p>

  <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-8">
    <app-project-card
      *ngFor="let project of projects"
      [title]="project.title"
      [description]="project.description"
      [emoji]="project.emoji"
      [technologies]="project.technologies"
      [gradientClass]="project.gradientClass"
    ></app-project-card>
  </div>
</div>
