<div class="group bg-white dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-lg overflow-hidden hover:border-blue-500 dark:hover:border-blue-500 transition">
  <div [ngClass]="['h-48', 'flex', 'items-center', 'justify-center', 'group-hover:scale-105', 'transition', gradientClass]">
    <span class="text-6xl">{{ emoji }}</span>
  </div>
  <div class="p-6">
    <h3 class="text-xl font-bold text-slate-900 dark:text-white mb-2">{{ title }}</h3>
    <p class="text-slate-600 dark:text-slate-400 mb-4">{{ description }}</p>
    <div class="flex flex-wrap gap-2 mb-4">
      <span *ngFor="let tech of technologies" class="text-xs bg-blue-100 dark:bg-blue-600/20 text-blue-600 dark:text-blue-400 px-3 py-1 rounded-full">
        {{ tech }}
      </span>
    </div>
    <button class="w-full px-4 py-2 bg-blue-600 hover:bg-blue-700 dark:bg-blue-600 dark:hover:bg-blue-700 text-white rounded-lg transition">
      Ver proyecto
    </button>
  </div>
</div>
