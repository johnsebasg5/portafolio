<div class="min-h-screen bg-white dark:bg-gradient-to-br dark:from-slate-900 dark:via-slate-800 dark:to-slate-900">
  <!-- Contact Header -->
  <section class="pt-32 pb-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-4xl mx-auto text-center">
      <h1 class="text-5xl md:text-6xl font-bold text-slate-900 dark:text-white mb-6 leading-tight">
        Ponte en <span class="text-blue-600 dark:text-blue-500">Contacto</span>
      </h1>
      <p class="text-xl text-slate-600 dark:text-slate-300">
        ¿Tienes un proyecto en mente? Me encantaría saber de ti. Déjame un mensaje y te responderé lo antes posible.
      </p>
    </div>
  </section>

  <!-- Contact Form Section -->
  <section class="pb-20 px-4 sm:px-6 lg:px-8">
    <div class="max-w-2xl mx-auto">
      <app-contact-form></app-contact-form>

      <!-- Contact Info -->
      <div class="mt-16 pt-16 border-t border-slate-200 dark:border-slate-700">
        <h2 class="text-2xl font-bold text-slate-900 dark:text-white mb-8 text-center">Otras formas de contactarme</h2>
        <app-contact-info></app-contact-info>
      </div>

      <!-- Social Links -->
      <div class="mt-12 text-center">
        <app-social-links></app-social-links>
      </div>
    </div>
  </section>
</div>
