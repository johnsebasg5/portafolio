<form class="space-y-6">
  <!-- Name Field -->
  <div>
    <label class="block text-sm font-medium text-slate-900 dark:text-white mb-2">Nombre</label>
    <input
      type="text"
      placeholder="Tu nombre"
      class="w-full px-4 py-3 bg-white dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-lg text-slate-900 dark:text-white placeholder-slate-500 dark:placeholder-slate-500 focus:border-blue-500 dark:focus:border-blue-500 focus:outline-none transition"
    />
  </div>

  <!-- Email Field -->
  <div>
    <label class="block text-sm font-medium text-slate-900 dark:text-white mb-2">Email</label>
    <input
      type="email"
      placeholder="tu@email.com"
      class="w-full px-4 py-3 bg-white dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-lg text-slate-900 dark:text-white placeholder-slate-500 dark:placeholder-slate-500 focus:border-blue-500 dark:focus:border-blue-500 focus:outline-none transition"
    />
  </div>

  <!-- Subject Field -->
  <div>
    <label class="block text-sm font-medium text-slate-900 dark:text-white mb-2">Asunto</label>
    <input
      type="text"
      placeholder="Asunto del mensaje"
      class="w-full px-4 py-3 bg-white dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-lg text-slate-900 dark:text-white placeholder-slate-500 dark:placeholder-slate-500 focus:border-blue-500 dark:focus:border-blue-500 focus:outline-none transition"
    />
  </div>

  <!-- Message Field -->
  <div>
    <label class="block text-sm font-medium text-slate-900 dark:text-white mb-2">Mensaje</label>
    <textarea
      placeholder="Cuéntame sobre tu proyecto..."
      rows="6"
      class="w-full px-4 py-3 bg-white dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-lg text-slate-900 dark:text-white placeholder-slate-500 dark:placeholder-slate-500 focus:border-blue-500 dark:focus:border-blue-500 focus:outline-none transition resize-none"
    ></textarea>
  </div>

  <!-- Submit Button -->
  <button
    type="submit"
    class="w-full px-8 py-4 bg-blue-600 hover:bg-blue-700 dark:bg-blue-600 dark:hover:bg-blue-700 text-white font-semibold rounded-lg transition transform hover:scale-105"
  >
    Enviar Mensaje
  </button>
</form>
