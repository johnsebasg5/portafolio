<div class="min-h-screen bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900 flex items-center justify-center px-4">
  <div class="max-w-2xl w-full text-center">
    <!-- 404 Title -->
    <div class="mb-8">
      <h1 class="text-9xl md:text-[150px] font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-500 to-blue-600 mb-4">
        404
      </h1>
      <div class="text-6xl mb-8">😔</div>
    </div>

    <!-- Message -->
    <h2 class="text-4xl md:text-5xl font-bold text-white mb-6">
      Página no encontrada
    </h2>
    <p class="text-xl text-slate-300 mb-12 leading-relaxed">
      Lo sentimos, la página que buscas no existe o ha sido movida. Parece que te has perdido en el camino.
    </p>

    <!-- Actions -->
    <div class="space-y-4">
      <div class="flex flex-col sm:flex-row gap-4 justify-center">
        <a
          routerLink="/"
          class="px-8 py-4 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-lg transition transform hover:scale-105 inline-block"
        >
          Volver al inicio
        </a>
        <button
          (click)="goBack()"
          class="px-8 py-4 bg-slate-700 hover:bg-slate-600 text-white font-semibold rounded-lg transition transform hover:scale-105"
        >
          Volver atrás
        </button>
      </div>
    </div>

    <!-- Decorative elements -->
    <div class="mt-16 pt-8 border-t border-slate-700">
      <p class="text-slate-500 text-sm">
        Si crees que esto es un error, por favor contacta con soporte
      </p>
    </div>
  </div>
</div>
